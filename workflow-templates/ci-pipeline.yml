# Generic CI pipeline — customize lint, test, and build steps for your stack.
# Adopt from: Actions → New workflow → Organization workflows → CI Pipeline

name: CI Pipeline

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
