# Validate PR title follows Conventional Commits and label PR by size.
name: PR Hygiene

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._-]+\))?!?: .+|^(Merge pull request #|Revert ).+'
          if ! echo "${TITLE}" | grep -Eq "${pattern}"; then
            echo "PR title must follow Conventional Commits, e.g. feat: add oauth client"
            exit 1
          fi

  size:
    name: PR size label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const total = pr.additions + pr.deletions;
            let size = 'size/XL';
            if (total < 10) size = 'size/XS';
            else if (total < 50) size = 'size/S';
            else if (total < 200) size = 'size/M';
            else if (total < 500) size = 'size/L';
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [size]
              });
            } catch (error) {
              core.info(`Optional: create ${size} label in repository if size labeling is desired`);
            }
