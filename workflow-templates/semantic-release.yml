# Automated SemVer, CHANGELOG, and GitHub Releases from Conventional Commits.
# Requires .releaserc.json and package.json with semantic-release devDependencies.
# See: https://semantic-release.gitbook.io/semantic-release/recipes/ci-configurations/github-actions

name: Semantic Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm clean-install

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
